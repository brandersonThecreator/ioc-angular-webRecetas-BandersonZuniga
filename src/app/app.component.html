<div class="app-container">
  <header class="header">
    <div class="header-content">
      <div class="logo">
        <h1>🍽️ {{ title }}</h1>
      </div>

      <nav class="navigation">
        <a routerLink="/cataleg" routerLinkActive="nav-activa" class="nav-link">
          📋 Catàleg
        </a>
        <a
          routerLink="/preferits"
          routerLinkActive="nav-activa"
          class="nav-link preferits-link"
        >
          ❤️ Preferits
          <span *ngIf="totalPreferits() > 0" class="comptador-badge">
            {{ totalPreferits() }}
          </span>
        </a>
      </nav>
    </div>
  </header>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>

  <footer class="footer">
    <p>&copy; 2024 WebRecetes - EAC3 Programació Avançada Angular</p>
  </footer>
</div>
