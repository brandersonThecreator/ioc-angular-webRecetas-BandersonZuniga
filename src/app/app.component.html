<!doctype html>
<div class="app-container">
  <header class="app-header">
    <div class="header-content">
      <h1 class="app-title">SaboresWeb</h1>
      <p class="app-subtitle">Les receptes més fàcils i delicioses</p>
      <p class="author-credit">per Branderson Zuniga Ramirez</p>
    </div>
  </header>

  <div class="cerca-section">
    <app-barra-cerca
      (cercaCanviada)="onCercaCanviada($event)"
    ></app-barra-cerca>
  </div>

  <main class="app-main">
    <div class="welcome-section" *ngIf="cercaTerme.length === 0">
      <h2>Tenim {{ receptes.length }} receptes per tu!</h2>
      <p>Cerca per nom, ingredient o categoria</p>
    </div>

    <app-llista-elements
      [elements]="receptes"
      [cercaTerme]="cercaTerme"
      (elementSeleccionat)="onReceptaSeleccionada($event)"
    >
    </app-llista-elements>
  </main>

  <footer class="app-footer">
    <p>EAC2 - Angular - 2026</p>
  </footer>
</div>

<router-outlet></router-outlet>
